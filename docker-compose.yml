services:
  postgres:
    image: postgres:16-alpine
    container_name: minerva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minerva}
      POSTGRES_USER: ${POSTGRES_USER:-minerva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minerva_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minerva} -d ${POSTGRES_DB:-minerva}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    container_name: minerva-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${CHECKPOINT_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${CHECKPOINT_S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    container_name: minerva-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${CHECKPOINT_S3_ACCESS_KEY:-minioadmin} ${CHECKPOINT_S3_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb local/${CHECKPOINT_S3_BUCKET:-minerva-checkpoints};
      exit 0;
      "

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
