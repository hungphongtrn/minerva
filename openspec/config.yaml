schema: spec-driven

context: |
  Project: Minerva (self-hosted OSS agent runtime)
  Backend: TypeScript on Node.js >= 20
  Backend framework: NestJS with Fastify adapter (@nestjs/platform-fastify)
  API/SSE style: NestJS modules/controllers with SSE streaming endpoints
  Agent runtime: @mariozechner/pi-agent-core
  Sandbox: Daytona TypeScript SDK
  Metadata store: Postgres (BYO infra)

  v0 constraints:
  - All code execution and filesystem access happen inside Daytona sandboxes.
  - Minimal tool surface is read/write/bash.
  - Stream run and tool progress via SSE.
  - Serialize runs per user_id and support cancellation/timeouts.

rules:
  proposal:
    - Keep scope on v0 orchestrator + sandbox execution.
    - Include explicit non-goals for deferred capabilities.
  design:
    - Document pi-agent-core to SSE event mapping and run lifecycle decisions.
  tasks:
    - Break tasks into small, bite-sized, testable steps.
    - Include testing for queue/lease behavior, SSE ordering, and sandbox tool execution.

